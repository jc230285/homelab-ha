name: Deploy to hom1

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy custom components and cards
        env:
          SSH_KEY: ${{ secrets.HOMELAB_SSH_KEY }}
          HOST: ${{ secrets.HOMELAB_HOST }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/homelab
          chmod 600 ~/.ssh/homelab
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Copy custom components
          rsync -av --delete \
            -e "ssh -i ~/.ssh/homelab" \
            custom_components/ \
            james@$HOST:/tmp/ha_custom_components/

          # Copy cards
          rsync -av \
            -e "ssh -i ~/.ssh/homelab" \
            custom_cards/ \
            james@$HOST:/tmp/ha_custom_cards/

          # Install on server and reload HA
          ssh -i ~/.ssh/homelab james@$HOST bash << 'REMOTE'
            set -e
            # Install custom components
            sudo rsync -av --delete /tmp/ha_custom_components/ /srv/homeassistant/config/custom_components/

            # Install cards
            sudo mkdir -p /srv/homeassistant/config/www/community
            for card_dir in /tmp/ha_custom_cards/*/; do
              card_name=$(basename "$card_dir")
              sudo mkdir -p "/srv/homeassistant/config/www/community/$card_name"
              sudo cp "$card_dir"*.js "/srv/homeassistant/config/www/community/$card_name/" 2>/dev/null || true
            done

            echo "Files installed"
          REMOTE

          # Reload HA core config (no restart needed for custom components after initial install)
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "http://$HOST:8123/api/services/homeassistant/reload_custom_templates" \
            -H "Authorization: Bearer $HA_TOKEN" \
            -H "Content-Type: application/json" || true

          # Restart HA container to pick up component changes
          ssh -i ~/.ssh/homelab james@$HOST "sudo docker restart homeassistant"
          echo "Deploy complete"
